<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GrooveLink - Contact</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="logo">GrooveLink</div>
    <div class="hamburger" id="hamburger">
      <span></span><span></span><span></span>
    </div>
    <nav id="navMenu">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="events.html">Events</a></li>
        <li><a href="submit.html">Submit Event</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="submit-cta reveal">
      <h2>Contact GrooveLink</h2>
      <form class="event-form" id="contactForm">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required>

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="4" required></textarea>

        <button type="submit" class="btn submit-btn">Send Message</button>
      </form>
    </section>
  </main>

  <footer>
    <div class="footer-links">
      <a href="index.html">Home</a> |
      <a href="about.html">About</a> |
      <a href="events.html">Events</a> |
      <a href="submit.html">Submit</a>
    </div>
    <p>© 2025 GrooveLink SA. All rights reserved.</p>
  </footer>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>

  <script src="menu.js"></script>
  <script src="scroll.js"></script>
  <script src="contact.js"></script>
</body>
</html>
