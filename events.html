<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GrooveLink - Events</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="logo">GrooveLink</div>
    <div class="hamburger" id="hamburger">
      <span></span><span></span><span></span>
    </div>
    <nav id="navMenu">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="events.html">Events</a></li>
        <li><a href="submit.html">Submit Event</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="featured-events reveal" id="events">
      <h2>Dance Events Across South Africa</h2>

      <section class="search-filter">
        <input type="text" id="searchBar" placeholder="Search events or location...">

        <select id="categoryFilter">
          <option value="">All Categories</option>
          <option value="Hip Hop">Hip Hop</option>
          <option value="Ballet">Ballet</option>
          <option value="Contemporary">Contemporary</option>
          <option value="Cultural">Cultural</option>
          <option value="Other">Other</option>
        </select>

        <!-- ✅ NEW: Province filter -->
        <select id="provinceFilter">
          <option value="">All Provinces</option>
          <option value="Gauteng">Gauteng</option>
          <option value="Western Cape">Western Cape</option>
          <option value="KwaZulu-Natal">KwaZulu-Natal</option>
          <option value="Eastern Cape">Eastern Cape</option>
          <option value="Limpopo">Limpopo</option>
          <option value="Mpumalanga">Mpumalanga</option>
          <option value="North West">North West</option>
          <option value="Free State">Free State</option>
          <option value="Northern Cape">Northern Cape</option>
          <option value="Nationwide">Nationwide</option>
        </select>

        <input type="date" id="dateFilter">
      </section>

      <div class="event-cards">
        <!-- Populated by events.js from Supabase -->
      </div>
    </section>
  </main>

  <footer>
    <div class="footer-links">
      <a href="index.html">Home</a> |
      <a href="about.html">About</a> |
      <a href="submit.html">Submit</a> |
      <a href="contact.html">Contact</a>
    </div>
    <p>© 2025 GrooveLink SA. All rights reserved.</p>
  </footer>

  <!-- Supabase SDK (must come before supabase.js and events.js) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>

  <script src="menu.js"></script>
  <script src="scroll.js"></script>
  <script src="events.js"></script>
</body>
</html>
